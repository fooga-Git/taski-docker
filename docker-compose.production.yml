volumes:
  pg_data_production:
  static_volume:

# Всё отличие — заменяем build на image и указываем, какой образ использовать
services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  backend:
    image: fooga35/taski_backend:latest # Качаем с Docker Hub
    env_file: .env
    volumes:
      - static_volume:/backend_static
  frontend:
    image: fooga35/taski_frontend:latest  # Качаем с Docker Hub
    env_file: .env
    command: sh -c "cp -r /app/build/. /frontend_static/ && tail -f /dev/null"
    volumes:
      - static_volume:/frontend_static
  gateway:
    image: fooga35/taski_gateway:latest  # ЗАМЕНИТЕ эту строку
    # image: username/taski_gateway  # УДАЛИТЕ эту строку
    env_file: .env
    volumes:
      - static_volume:/staticfiles/
    ports:
      - 8000:80
    depends_on:
      - backend 